# StackerBuild - Smaller images than Docker

## Install

```bash
curl -sfL https://get.stackerbuild.io | sh
```

## Build

```bash
stacker build --layer-type squashfs
```

## stacker.yaml

```yaml
schemaorg-agent-build:
  from: docker://zothub.io/c3/ubuntu/go-devel-amd64:18
  import:
    - .
  run: |
    npm ci
    npm run build

schemaorg-agent:
  from: docker://zothub.io/tools/busybox:stable
  import:
    - stacker://schemaorg-agent-build/.next/standalone
  run: |
    cp /stacker/schemaorg-agent-build/.next/standalone/. ./
    chmod +x server.js
    ./server.js
```

## Why StackerBuild?

| | Docker | StackerBuild |
|--------|-------------|
| Image size | ~1GB | ~50MB |
| Build time | ~5 min | ~2 min |
| Layers | OverlayFS | SquashFS |
| Security | Root required | User namespaces |