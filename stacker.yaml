# stacker.yaml - OCI-native build for schema.org Agent

build: schemaorg-agent
from:
  - type: oci
    ref: ghcr.io/caddy:2-alpine
    
run: |
  RUN /var/lib/stacker/layers.sh <<'RUNSCRIPT'
    copy dist /srv
    copy Caddyfile /etc/caddy/Caddyfile
    EXPOSE 8080
    CMD ["--config", "/etc/caddy/Caddyfile"]
  RUNSCRIPT

build_args:
  - DESTDIR=/srv

cmd:
  - --config
  - /etc/caddy/Caddyfile
